<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peşəkar Hüquq Xidməti</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #212529;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            padding: 30px 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #343a40;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #212529;
            font-size: 26px;
            margin: 10px 0;
        }
        h2 {
            color: #495057;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 30px;
        }
        .info-box {
            background-color: #f1f3f5;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }
        .info-box p {
            font-size: 16px;
            margin: 12px 0;
            color: #343a40;
            display: flex;
            align-items: center;
        }
        .info-box span {
            font-size: 22px;
            margin-right: 15px;
        }
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            padding: 16px 20px;
            text-decoration: none;
            font-size: 18px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }
        .contact-btn:active {
            transform: scale(0.98);
        }
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="image.PNG" alt="Vəkil" class="profile-img">

    <h1>Hüququn dili ilə ədalət</h1>
    <h2>Peşəkar hüquq xidməti</h2>

    <div class="info-box">
        <p><span>⚖️</span> Tam məxfi və peşəkar yanaşma</p>
        <p><span>💼</span> Məhkəmədə hüquqların müdafiəsi</p>
        <p><span>📄</span> Hüquqi sənədlərin hazırlanması</p>
    </div>

    <a href="https://wa.me/994502160504" class="contact-btn">
        📞 WhatsApp ilə Əlaqə: 050 216 05 04
    </a>

    <div class="footer">
        © 2026 Peşəkar Hüquq Xidməti.
    </div>
</div>

</body>
</html>
